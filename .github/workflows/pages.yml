# Forge View — GitHub Pages deploy
# Builds the web bundle (browser fallback mode: drag-and-drop and file-picker
# viewing, no native folder browsing) and publishes it to GitHub Pages.
#
# Requires Pages to be enabled for the repository with source "GitHub Actions"
# (Settings > Pages > Build and deployment > Source).

name: deploy-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: install dependencies
        run: pnpm install

      - name: run tests
        run: pnpm test

      # Project Pages are served from /<repo>/, so the asset base path must
      # match the repository name
      - name: build web bundle
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: pnpm exec tsc && pnpm exec vite build --base "/${REPO_NAME}/"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
