# Forge View — Multi-platform CI Build
# Triggers on push to main. Produces native installers as GitHub Actions
# workflow artifacts (no GitHub Release required).
#
# Artifacts produced per matrix job:
#   ubuntu-22.04  → forge-view_*.deb, forge-view_*.AppImage, forge-view_*.rpm
#   windows-latest → forge-view_*_x64_en-US.msi, forge-view_*_x64-setup.exe
#   macos-latest (aarch64) → forge-view_*_aarch64.dmg, forge-view_*.app
#   macos-latest (x86_64)  → forge-view_*_x64.dmg, forge-view_*.app
#
# Source: https://v2.tauri.app/distribute/pipelines/github/

name: publish

on:
  push:
    branches:
      - main

jobs:
  publish-tauri:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: test frontend
        run: pnpm test

      - name: check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: lint Rust
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: test Rust
        working-directory: src-tauri
        run: cargo test --locked

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
